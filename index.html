<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b3d2e" />
    <title>האוטובוס הבא • Next Bus</title>
    <link rel="stylesheet" href="./styles.css?v=__VERSION__" />
  </head>
  <body>
    <main>
      <div class="title">האוטובוס הבא 🚌</div>
      <div class="subtitle">זמני האוטובוסים הקרובים לתחנה הקרובה אליך</div>

      <div id="error" class="error" hidden></div>

      <!-- Loading state: shown immediately while we locate + fetch -->
      <section id="loading">
        <p class="muted">מאתר מיקום וזמני אוטובוסים<span class="spinner"></span></p>
      </section>

      <!-- Fallback: shown only if location access is denied/unavailable -->
      <section id="start" hidden>
        <button id="locate" class="refresh">מצא תחנה קרובה</button>
        <p class="muted" style="margin-top: 16px">
          אשרו גישה למיקום כדי לראות אילו קווים מגיעים לתחנה הקרובה ובעוד כמה
          דקות.
        </p>
      </section>

      <!-- Results state -->
      <section id="results" hidden>
        <div id="stop-card" class="stop-card"></div>

        <div class="other-stops">
          <div class="stops-header">
            <h3>בחרו תחנה קרובה</h3>
            <button id="refresh-loc" class="relocate" type="button">
              📍 עדכון מיקום
            </button>
          </div>
          <div id="stop-dropdown" class="dropdown">
            <button
              id="stop-toggle"
              class="dropdown-toggle"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="dropdown-label"></span>
            </button>
            <ul id="stop-menu" class="dropdown-menu" role="listbox" hidden></ul>
          </div>
        </div>

        <div id="refresh-status" class="refresh-status" hidden>
          <span class="live-dot"></span>
          <span id="refresh-text"></span>
        </div>

        <div id="arrivals"></div>
      </section>

      <div class="footer">
        זמן אמת דרך ה־API הציבורי של
        <a href="https://bus.gov.il" target="_blank" rel="noreferrer">bus.gov.il</a>
        (משרד התחבורה) · לוח זמנים מגיבוי
        <a href="https://github.com/hasadna/open-bus" target="_blank" rel="noreferrer"
          >תחבורה ציבורית פתוחה</a
        >
      </div>
    </main>

    <script type="module" src="./app.js?v=__VERSION__"></script>
  </body>
</html>
